<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premier League Forecast</title>
  <style>
    :root{--p:#37003c;--pink:#ff2882;--cyan:#00ff87;--blue:#04f5ff;--bg:#f5f2f8;--card:#fff;--text:#201727;--muted:#746b7b;--line:#eadff0;}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    header{background:radial-gradient(circle at top right,rgba(255,40,130,.48),transparent 35%),linear-gradient(135deg,var(--p),#17001b);color:white;padding:24px 16px 30px;border-bottom-left-radius:32px;border-bottom-right-radius:32px}
    .wrap{max-width:1100px;margin:0 auto}.label{font-size:12px;letter-spacing:.14em;font-weight:900;opacity:.9}.label:before{content:"";display:inline-block;width:8px;height:8px;background:var(--cyan);border-radius:99px;margin-right:8px;box-shadow:0 0 14px var(--cyan)}
    h1{margin:10px 0 8px;font-size:clamp(30px,7vw,58px);line-height:.98;letter-spacing:-.05em}.sub{margin:0;max-width:760px;color:#ecdff1;line-height:1.7;font-size:14px}
    .hero{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.hero div{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:14px}.hero span{display:block;font-size:11px;color:#ead7ef;font-weight:800}.hero b{display:block;margin-top:5px;font-size:24px}
    main{padding:16px}.note{background:#fff7dc;border:1px solid #f0d175;color:#574000;border-radius:16px;padding:12px 14px;line-height:1.7;font-size:13px;margin:16px 0}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}.tabs button{border:1px solid var(--line);border-radius:999px;background:white;color:var(--p);padding:12px 8px;font-weight:900;cursor:pointer}.tabs button.active{background:var(--p);color:white}.title{color:var(--p);font-size:20px;margin:22px 0 12px}
    .table-card{background:white;border:1px solid var(--line);border-radius:24px;box-shadow:0 10px 30px rgba(55,0,60,.08);overflow:hidden}.scroll{overflow-x:auto}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:12px 10px;border-bottom:1px solid #f1eaf5;text-align:right;font-size:13px;white-space:nowrap}th{background:#fbf8fd;color:var(--muted);font-size:12px}th:nth-child(1),td:nth-child(1),th:nth-child(2),td:nth-child(2){text-align:left}.rank{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:10px;background:var(--p);color:white;font-weight:950}.team{font-weight:950;color:var(--p)}
    .prob{display:grid;grid-template-columns:58px 1fr;gap:8px;align-items:center}.track{height:10px;background:#eee7f3;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--blue),var(--cyan));border-radius:999px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:white;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:0 8px 24px rgba(55,0,60,.06)}.card h3{margin:0 0 8px;color:var(--p);font-size:18px}.big{font-size:38px;font-weight:1000;letter-spacing:-.05em;color:var(--p)}.mini{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}.mini div{background:#fbf8fd;border:1px solid #f1eaf5;border-radius:14px;padding:8px}.mini span{display:block;color:var(--muted);font-size:11px}.mini b{font-size:15px}.fixtures{display:grid;gap:10px}.fix{background:white;border:1px solid var(--line);border-radius:20px;padding:14px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}.club{font-weight:950;color:var(--p)}.away{text-align:right}.vs{background:var(--p);color:white;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:950}.fixprob{grid-column:1/-1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.fixprob div{background:#fbf8fd;border-radius:12px;padding:8px;text-align:center;font-size:12px;color:var(--muted)}.fixprob b{display:block;color:var(--text);font-size:15px}.status{color:var(--muted);font-size:12px;margin-top:18px}
    @media(max-width:760px){.hero,.cards{grid-template-columns:repeat(2,1fr)}.tabs{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){header{padding:22px 14px 28px}.hero,.cards{grid-template-columns:1fr}.tabs button{font-size:12px}.fix{grid-template-columns:1fr auto 1fr}.club{font-size:13px}}
  </style>
</head>
<body>
<header><div class="wrap"><div class="label">PREMIER LEAGUE FORECAST</div><h1>順位予想<br>Monte Carlo風モデル</h1><p class="sub">現在勝点・Elo・xG・守備力・選手層・直近フォーム・怪我人ペナルティを使って、優勝確率、Top4確率、降格確率、予想勝点を表示します。</p><div class="hero"><div><span>優勝本命</span><b id="topTeam">--</b></div><div><span>優勝確率</span><b id="topProb">--%</b></div><div><span>対象チーム</span><b>20</b></div><div><span>表示</span><b>スマホOK</b></div></div></div></header>
<main class="wrap"><div class="note">これはまず動くデモ版です。数値はデモ値なので、本気で使う場合は現在勝点・残り試合・xG・Elo・怪我人を最新データに差し替えてください。</div><div class="tabs"><button class="active" data-tab="table">総合順位</button><button data-tab="title">優勝争い</button><button data-tab="top4">Top4争い</button><button data-tab="down">降格争い</button></div><section id="view"></section><p class="status">GitHub Pagesで開けば、PCでもスマホでもこの画面が表示されます。</p></main>
<script>
const teams=[
{name:'Arsenal',s:'ARS',pts:56,pl:27,elo:91,xg:88,def:91,squad:90,form:88,inj:3},
{name:'Liverpool',s:'LIV',pts:55,pl:27,elo:92,xg:89,def:86,squad:91,form:85,inj:4},
{name:'Manchester City',s:'MCI',pts:53,pl:27,elo:94,xg:90,def:88,squad:94,form:82,inj:5},
{name:'Chelsea',s:'CHE',pts:49,pl:27,elo:86,xg:84,def:79,squad:87,form:81,inj:5},
{name:'Newcastle United',s:'NEW',pts:47,pl:27,elo:85,xg:82,def:78,squad:84,form:80,inj:6},
{name:'Tottenham Hotspur',s:'TOT',pts:45,pl:27,elo:83,xg:81,def:75,squad:83,form:77,inj:7},
{name:'Aston Villa',s:'AVL',pts:44,pl:27,elo:84,xg:79,def:77,squad:82,form:78,inj:5},
{name:'Manchester United',s:'MUN',pts:42,pl:27,elo:82,xg:76,def:74,squad:84,form:73,inj:8},
{name:'Brighton',s:'BHA',pts:39,pl:27,elo:80,xg:78,def:73,squad:78,form:75,inj:6},
{name:'Bournemouth',s:'BOU',pts:38,pl:27,elo:78,xg:76,def:72,squad:75,form:76,inj:4},
{name:'Crystal Palace',s:'CRY',pts:36,pl:27,elo:77,xg:72,def:74,squad:76,form:74,inj:5},
{name:'Fulham',s:'FUL',pts:35,pl:27,elo:76,xg:73,def:72,squad:75,form:72,inj:4},
{name:'Brentford',s:'BRE',pts:33,pl:27,elo:75,xg:72,def:68,squad:73,form:71,inj:6},
{name:'Everton',s:'EVE',pts:32,pl:27,elo:74,xg:68,def:71,squad:72,form:70,inj:5},
{name:'West Ham United',s:'WHU',pts:31,pl:27,elo:74,xg:69,def:66,squad:74,form:68,inj:7},
{name:'Nottingham Forest',s:'NFO',pts:30,pl:27,elo:73,xg:68,def:67,squad:72,form:69,inj:6},
{name:'Wolves',s:'WOL',pts:27,pl:27,elo:70,xg:65,def:63,squad:69,form:64,inj:8},
{name:'Leeds United',s:'LEE',pts:25,pl:27,elo:69,xg:66,def:61,squad:68,form:65,inj:7},
{name:'Burnley',s:'BUR',pts:22,pl:27,elo:66,xg:61,def:58,squad:65,form:62,inj:6},
{name:'Sunderland',s:'SUN',pts:21,pl:27,elo:65,xg:60,def:57,squad:64,form:61,inj:7}
];
function strength(t){return t.elo*.3+t.xg*.25+t.def*.2+t.squad*.15+t.form*.1-t.inj*.55}
function calc(){const a=teams.map(t=>({...t,str:strength(t)}));const avg=a.reduce((s,t)=>s+t.str,0)/a.length;let rows=a.map(t=>{const rem=38-t.pl;const ppg=1.25+(t.str-avg)/9;const expPts=t.pts+Math.max(.55,Math.min(2.55,ppg))*rem;return {...t,expPts}});rows.sort((a,b)=>b.expPts-a.expPts);rows=rows.map((t,i)=>({...t,rank:i+1,expRank:i+1}));const titleRaw=rows.map(t=>Math.exp((t.expPts-rows[0].expPts)/3.2));const sum=titleRaw.reduce((a,b)=>a+b,0);rows=rows.map((t,i)=>{const top4=100/(1+Math.exp((t.rank-4.5)*1.35));const top5=100/(1+Math.exp((t.rank-5.5)*1.35));const down=100/(1+Math.exp((17.4-t.rank)*1.3));return {...t,title:titleRaw[i]/sum*100,top4,top5,down}});return rows}
const rows=calc();document.getElementById('topTeam').textContent=rows[0].s;document.getElementById('topProb').textContent=rows[0].title.toFixed(1)+'%';
function pc(v){return `<div class="prob"><b>${v.toFixed(1)}%</b><div class="track"><div class="bar" style="width:${Math.max(0,Math.min(100,v))}%"></div></div></div>`}
function table(){view.innerHTML=`<h2 class="title">総合順位予想</h2><div class="table-card"><div class="scroll"><table><thead><tr><th>順位</th><th>チーム</th><th>現在勝点</th><th>予想勝点</th><th>優勝</th><th>Top4</th><th>Top5</th><th>降格</th><th>強さ</th></tr></thead><tbody>${rows.map((t,i)=>`<tr><td><span class="rank">${i+1}</span></td><td class="team">${t.name}</td><td>${t.pts}</td><td><b>${t.expPts.toFixed(1)}</b></td><td>${pc(t.title)}</td><td>${pc(t.top4)}</td><td>${pc(t.top5)}</td><td>${pc(t.down)}</td><td>${t.str.toFixed(1)}</td></tr>`).join('')}</tbody></table></div></div>`}
function cards(kind,title,color){let key=kind;let list=[...rows].sort((a,b)=>b[key]-a[key]).slice(0,9);view.innerHTML=`<h2 class="title">${title}</h2><div class="cards">${list.map((t,i)=>`<article class="card"><h3>${i+1}. ${t.name}</h3><div class="big" style="color:${color||'var(--p)'}">${t[key].toFixed(1)}%</div><div class="track"><div class="bar" style="width:${t[key]}%"></div></div><div class="mini"><div><span>現在勝点</span><b>${t.pts}</b></div><div><span>予想勝点</span><b>${t.expPts.toFixed(1)}</b></div><div><span>強さ</span><b>${t.str.toFixed(1)}</b></div><div><span>フォーム</span><b>${t.form}</b></div></div></article>`).join('')}</div>`}
const view=document.getElementById('view');table();document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');const t=b.dataset.tab;if(t==='table')table();if(t==='title')cards('title','優勝確率ランキング');if(t==='top4')cards('top4','Top4確率ランキング');if(t==='down')cards('down','降格確率ランキング','#d91f3d')});
</script>
</body>
</html>
